name: Build APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      gradle_task:
        description: "Gradle task to run"
        required: true
        default: ":app:assembleSideloadRelease"
        type: choice
        options:
          - ":app:assembleSideloadRelease"
          - ":app:assembleSideloadStaging"
          - ":app:assembleSideloadDebug"
          - ":app:assemblePlayRelease"
          - ":app:assemblePlayStaging"
          - ":app:assemblePlayDebug"
      release_tag:
        description: "Release tag for manual runs. Leave blank to upload artifact only."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}-${{ inputs.gradle_task }}
  cancel-in-progress: false

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build
        run: ./gradlew "${{ github.event.inputs.gradle_task || ':app:assembleSideloadRelease' }}" --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk -name "*.apk" -type f -print -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arvio-apks
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ -n "$MANUAL_TAG" ]; then
            tag="$MANUAL_TAG"
            git tag "$tag" || true
            git push origin "$tag" || true
          fi
          gh release create "$tag" release-artifacts/*.apk \
            --title "ARVIO $tag" \
            --notes "Cockpit-managed ARVIO APK build." \
            --latest
